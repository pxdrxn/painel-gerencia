# Render Blueprint — Deploy configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sos-credito-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false  # Setar manualmente com Neon connection string
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://sos-credito.vercel.app
      - key: CORS_ORIGINS
        value: '["https://sos-credito.vercel.app"]'
